name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: dynamicsway
  REGION: us-central1
  SERVICE_NAME: gledger-www
  REPOSITORY: gledger
  IMAGE_NAME: gledger-www

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build Docker image
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$COMMIT_SHA" \
            -t "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest" \
            .

      - name: Push Docker image
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$COMMIT_SHA"
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --port=3000
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --allow-unauthenticated
            --set-secrets=TURNSTILE_SECRET_KEY=TURNSTILE_SECRET_KEY:latest
